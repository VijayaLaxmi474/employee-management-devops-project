<!DOCTYPE html>
<html>

<head>

<title>Employees</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<div class="card">

<h2>Employees</h2>

<a class="btn" href="/add">
Add Employee
</a>

<br><br>

<table>

<tr>

<th>ID</th>

<th>Name</th>

<th>Email</th>

<th>Department</th>

<th>Action</th>

</tr>

{% for employee in employees %}

<tr>

<td>{{ employee.id }}</td>

<td>{{ employee.name }}</td>

<td>{{ employee.email }}</td>

<td>{{ employee.department }}</td>

<td>

<a href="/delete/{{ employee.id }}">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</div>

</body>

</html>
